# ============================================================================
# dns.conf — ONE configuration for BOTH the native build and Docker.
#
#   Native : cron_scripts/dns-startup sources this file.
#   Docker : `make docker` injects it into the containers (env_file) and starts
#            only the servers whose *_ENABLED toggle is true.
#
# RULES (so the file works for shell AND Docker's env_file parser):
#   - one KEY=value per line, no spaces around '='
#   - NO quotes, NO spaces inside values, NO trailing inline comments
#   - comments live on their own lines
#
# Flip *_ENABLED=true/false to turn a whole server, or an optional feature,
# on or off. The two servers are fully independent — nothing is shared.
# ============================================================================


# ============================== auth_dns ====================================
# Authoritative front door. ALWAYS listens on :53 (published in Docker) and
# forwards recursive queries to the upstream resolver.

AUTH_ENABLED=true
AUTH_THREADS=20
AUTH_QUEUE=512

# Where auth forwards recursive queries.
#   Leave AUTH_UPSTREAM_IP BLANK to use the bundled upstream_dns
#   (auto: 127.0.0.1 native / 172.28.0.2 docker).
#   Set it to an external resolver (e.g. 1.1.1.1) to run auth WITHOUT upstream.
# AUTH_UPSTREAM_PORT blank = bundled upstream's port (UPSTREAM_PORT), else 53.
AUTH_UPSTREAM_IP=
AUTH_UPSTREAM_PORT=

# Drop root -> user after binding :53 (-U). Disable to stay root (native only).
AUTH_DROP_ENABLED=true
AUTH_DROP_USER=nobody

# Per-source rate limit, queries/sec (-r).
AUTH_RATELIMIT_ENABLED=false
AUTH_RATELIMIT_QPS=50

# Restrict who may use recursion to these CIDRs (-a), comma-separated.
AUTH_ACL_ENABLED=false
AUTH_ACL_CIDRS=127.0.0.1/32,::1/128

# Bind to one address instead of all interfaces (-b).
AUTH_BIND_ENABLED=false
AUTH_BIND_ADDR=0.0.0.0

# Blocklist sink behaviour (-S): nxdomain, refused, or a sink IP.
AUTH_BLOCK_ENABLED=false
AUTH_BLOCK_MODE=nxdomain


# ============================ upstream_dns ==================================
# Recursive resolver. In Docker it is private (no published port); auth reaches
# it at a fixed internal IP.

UPSTREAM_ENABLED=true
UPSTREAM_PORT=5335
UPSTREAM_THREADS=20
UPSTREAM_QUEUE=512

UPSTREAM_DROP_ENABLED=true
UPSTREAM_DROP_USER=nobody

UPSTREAM_RATELIMIT_ENABLED=false
UPSTREAM_RATELIMIT_QPS=50

UPSTREAM_ACL_ENABLED=false
UPSTREAM_ACL_CIDRS=127.0.0.1/32,::1/128

UPSTREAM_BIND_ENABLED=false
UPSTREAM_BIND_ADDR=0.0.0.0
