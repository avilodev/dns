# ============================================================
# auth_dns DNSSEC Online Signing Configuration
# ============================================================
#
# For each zone you want signed, add a [zone] section with paths
# to the KSK (Key Signing Key) and ZSK (Zone Signing Key) PEM files.
#
# Key file paths can be:
#   - Relative to this config directory (e.g. avilo.com.zsk.pem)
#   - Absolute (e.g. /etc/dns/keys/avilo.com.zsk.pem)
#
# Generate keys:
#   openssl genpkey -algorithm ED25519 -out avilo.com.zsk.pem
#   openssl genpkey -algorithm ED25519 -out avilo.com.ksk.pem
#
# Supported algorithms:
#   8  = RSASHA256      (2048-bit RSA)
#   10 = RSASHA512
#   13 = ECDSAP256SHA256
#   14 = ECDSAP384SHA384
#   15 = Ed25519        (recommended: smallest keys, fast, secure)
#
# Signatures are only added when the client sends EDNS DO=1.
# Zones without entries here are served unsigned.
# ============================================================


# Example — uncomment and fill in to enable signing for avilo.com:
#
# [avilo.com]
# ksk_algorithm = 15
# ksk_file      = avilo.com.ksk.pem
# zsk_algorithm = 15
# zsk_file      = avilo.com.zsk.pem
#
# [avilo.priv]
# ksk_algorithm = 15
# ksk_file      = avilo.priv.ksk.pem
# zsk_algorithm = 15
# zsk_file      = avilo.priv.zsk.pem
#
# [adoliva.com]
# ksk_algorithm = 15
# ksk_file      = adoliva.com.ksk.pem
# zsk_algorithm = 15
# zsk_file      = adoliva.com.zsk.pem
