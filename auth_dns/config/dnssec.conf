# auth_dns DNSSEC signing configuration
#
# For each zone, specify paths to PEM private key files for the KSK and ZSK.
# Generate keys with, e.g.:
#   openssl genpkey -algorithm ED25519 -out avilo.com.zsk.pem
#   openssl genpkey -algorithm ED25519 -out avilo.com.ksk.pem
#
# Supported algorithms:
#   8  = RSASHA256 (2048-bit RSA recommended)
#   10 = RSASHA512
#   13 = ECDSAP256SHA256
#   14 = ECDSAP384SHA384
#   15 = Ed25519  (recommended: smallest keys, fast, secure)
#
# Format:
#   [zone]
#   ksk_algorithm = <alg_number>
#   ksk_file      = <path_to_ksk_pem>
#   zsk_algorithm = <alg_number>
#   zsk_file      = <path_to_zsk_pem>
#
# Example (avilo.com, Ed25519):
#
# [avilo.com]
# ksk_algorithm = 15
# ksk_file      = /home/avilo/dns/auth_dns/config/avilo.com.ksk.pem
# zsk_algorithm = 15
# zsk_file      = /home/avilo/dns/auth_dns/config/avilo.com.zsk.pem
#
# [avilo.priv]
# ksk_algorithm = 15
# ksk_file      = /home/avilo/dns/auth_dns/config/avilo.priv.ksk.pem
# zsk_algorithm = 15
# zsk_file      = /home/avilo/dns/auth_dns/config/avilo.priv.zsk.pem
