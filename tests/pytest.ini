[pytest]
addopts = -ra --tb=short --strict-markers
testpaths = .
python_files = test_*.py
markers =
    internet: requires outbound DNS to the real internet
    ipv6: requires loopback IPv6 support
    stress: long-running / load-test (deselect with -m 'not stress')
    modifies_zone: mutates the on-disk zone file (opt in with DNS_TESTS_MUTATE=1)
